spring:
  application:
    name: "hogwarts-artifacts-school"
  profiles:
    active: dev # active profile by default is dev. in production,it will be replaced by prod by azure environment variable
server:
  port: 80

api:
  endpoint:
    base-url: "/api/v1"

management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
    exporter:
      zipkin:
        enabled: true
        endpoint: http://localhost:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,prometheus
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true
    git:
      enabled: true
      mode: full

info:
  application:
    name: hogwarts-artifacts-online
    description: A web application that manages the artifacts and wizards for hogwarts school.
    version: @project.version@
    author: Ahmed Ashraf
    links:
      github: https://github.com/AhmedAshraf19994/hogwarts-artifacts-online
logging:
  level:
    io.micrometer.tracing: DEBUG
    zipkin2: DEBUG
